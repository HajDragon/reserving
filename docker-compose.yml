services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: reserving_app
    container_name: reserving_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
      - ./vendor:/var/www/html/vendor:delegated
      - ./storage:/var/www/html/storage:delegated
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    environment:
      APP_ENV: local
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-reserving}
      DB_USERNAME: ${DB_USERNAME:-res_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      # Mail settings (use .env.docker or host env to override)
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
    depends_on:
      - db
      - mailhog
    ports: []

  web:
    image: nginx:alpine
    container_name: reserving_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    image: reserving_node
    container_name: reserving_node
    working_dir: /var/www/html
    command: ["npm", "run", "dev"]
    volumes:
      - ./:/var/www/html:cached
      - node_modules:/var/www/html/node_modules
    ports:
      - "5173:5173"

  db:
    image: mysql:8.0
    container_name: reserving_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-reserving}
      MYSQL_USER: ${DB_USERNAME:-res_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"

  mailhog:
    image: mailhog/mailhog
    container_name: reserving_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "18025:8025"

volumes:
  db_data:
  node_modules:
